# ─────────────────────────────────────────────────────────────
# JOURNEY — drives the mountain-range panorama (Scene 3)
#
# Each entry = one peak. Order matters: first entry = first (smallest) peak,
# last entry = the current climb (tallest peak, summit in clouds, no flag).
#
# Fields:
#   role    — shown on the summit tag
#   company — optional; shown under the role on the summit tag
#   period  — free text ("2016", "2019–2020", "2025–Present")
#   summit  — one line: what you achieved/learned on this peak
#   valley  — one line: why you climbed down to start the next climb
#             (the LAST entry's valley is the current state — still ascending)
#   skills  — optional, max 2–3 tags drawn near the peak as story texture
#
# Edit freely; the panorama redraws from this file. Add a new entry when
# the next chapter begins — the range simply extends.
# ─────────────────────────────────────────────────────────────

